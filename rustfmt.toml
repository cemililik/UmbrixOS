# Tyrne formatting rules.
#
# The project policy lives in docs/standards/documentation-style.md (for docs)
# and docs/standards/code-style.md (for code). This file codifies the
# formatter-level choices that code-style references.
#
# Only stable rustfmt options are used so the configuration works across
# toolchain bumps.

max_width = 100
newline_style = "Unix"
use_field_init_shorthand = true
use_try_shorthand = true
reorder_imports = true
reorder_modules = true
